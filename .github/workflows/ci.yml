name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Doctests are skipped: progenitor embeds upstream JSON examples as
      # rustdoc code blocks, several of which fail to parse as Rust (e.g.
      # `prefix `json` is unknown`). Re-enable once those are fixed upstream.
      - run: cargo test --lib --tests --all-features
      - run: cargo build --examples --all-features

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # No rust-cache: fmt doesn't compile, so a cache miss is wasted work.
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      # Fail the build on broken intra-doc links or other rustdoc warnings.
      # `rustdoc::broken_intra_doc_links` and `rustdoc::bare_urls` are
      # allowed at the crate root for the include!()'d generated modules.
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
